services:
  frontend:
    build:
      context: ./src/front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: seucorre-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seucorre-backend
    env_file:
      - ${BACKEND_ENV_FILE:-.env.production}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: seucorre-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seucorre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troque-esta-senha}
      POSTGRES_DB: ${POSTGRES_DB:-seucorre_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: seucorre-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
