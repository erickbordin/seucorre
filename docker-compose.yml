
services:
  db:
    image: postgres:15-alpine
    container_name: seucorre-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seucorre_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: seucorre-redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: seucorre-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@seucorre.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"