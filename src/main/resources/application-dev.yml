spring:
  cache:
    type: none
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/seucorre_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate # Flyway gerencia o schema
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    baseline-on-migrate: false
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:mock-key} # Mock para dev

logging:
  level:
    com.seucorre: DEBUG

seucorre:
  ia:
    provider: ${IA_PROVIDER:ollama}
    anthropic:
      model: claude-sonnet-4
      max-tokens: 8192
      timeout-seconds: 30
      max-retries: 3
      initial-backoff-millis: 500
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434/api/generate}
      model: ${OLLAMA_MODEL:llama3.2}
      timeout-seconds: 180
      max-retries: 1
      initial-backoff-millis: 500
      temperature: 0.0
      num-predict: 2600
      keep-alive: 15m

api:
  security:
    token:
      secret: ${JWT_SECRET:seucorre_dev_secret}
