spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://host.docker.internal:5432/seucorre_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate # Flyway gerencia o schema
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:host.docker.internal}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    baseline-on-migrate: false
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:mock-key} # Mock para dev

logging:
  level:
    com.seucorre: DEBUG
