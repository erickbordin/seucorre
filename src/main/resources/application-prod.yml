spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      url: ${REDIS_URL}
  flyway:
    baseline-on-migrate: true
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}

server:
  port: 8080
  ssl: # Recomendado habilitar em prod via Load Balancer ou direto aqui
    enabled: true

logging:
  level:
    com.seucorre: INFO

seucorre:
  ia:
    anthropic:
      model: claude-sonnet-4
      max-tokens: 8192
      timeout-seconds: 30
      max-retries: 3
      initial-backoff-millis: 500
