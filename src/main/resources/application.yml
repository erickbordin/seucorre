spring:
  profiles:
    active: dev # Perfil padrão
  application:
    name: seucorre-api
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

# Configurações de Negócio (Ciência da Corrida)
seucorre:
  treino:
    fator-carga-base: 1.1 # Regra dos 10% para prevenção de lesões
    frequencia-max-padrao: 220
  scheduler:
    zone: UTC
    treino:
      lembrete-manha-cron: "0 0 6 * * *"
      abertura-checkin-cron: "0 0 8 * * MON"
      calculo-progresso-cron: "0 0 23 * * *"
